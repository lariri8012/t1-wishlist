<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T1 HG Wishlist v3.0</title>
    <style>
        :root { 
            --t1-red: #D9384A; --t1-charcoal: #2D2D2D; --bg-color: #F8F9FA; --card-bg: #FFFFFF; 
            --cat-hg-bg: #FFF0F2; --cat-hg-border: #FFB3C1;
            --cat-pre-bg: #F0F7FF; --cat-pre-border: #A3CFFF;
            --cat-gen-bg: #F0F0F0; --cat-gen-border: #CCCCCC;
        }
        
        body { background: var(--bg-color); color: var(--t1-charcoal); font-family: -apple-system, sans-serif; margin: 0; padding: 15px; padding-bottom: 240px; }
        
        .header { text-align: center; padding: 20px 0; border-bottom: 4px solid var(--t1-red); position: sticky; top: 0; background: var(--bg-color); z-index: 1000; }
        .header h1 { margin:0; font-size: 22px; font-weight: 900; letter-spacing: 1px; color: var(--t1-charcoal); }
        .header p { margin: 5px 0 0 0; font-size: 11px; color: #888; font-weight: bold; }
        
        .currency-bar { background: var(--card-bg); padding: 12px; border-radius: 12px; font-size: 12px; margin: 15px 0; text-align: center; font-weight: bold; border: 2px solid #E0E0E0; color: #666; }
        
        .category-section { margin-top: 35px; border-radius: 16px; border: 3px solid; padding: 15px 10px; }
        .category-title { font-size: 14px; font-weight: 900; margin: -30px 0 15px 10px; display: inline-block; padding: 6px 16px; border-radius: 20px; }
        
        .cat-hg { border-color: var(--cat-hg-border); background: var(--cat-hg-bg); } .cat-hg .category-title { background: var(--t1-red); color: white; }
        .cat-pre { border-color: var(--cat-pre-border); background: var(--cat-pre-bg); } .cat-pre .category-title { background: #3b82f6; color: white; }
        .cat-general { border-color: var(--cat-gen-border); background: var(--cat-gen-bg); } .cat-general .category-title { background: #888; color: white; }
        
        .item-row { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; flex-direction: column; border: 2px solid transparent; opacity: 0.6; transform: scale(0.98); transition: all 0.2s ease; }
        .item-row.active { opacity: 1; transform: scale(1); border: 2px solid var(--t1-red); box-shadow: 0 4px 12px rgba(217, 56, 74, 0.15); }
        
        .item-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-id { font-size: 11px; font-weight: 900; color: var(--t1-red); margin-bottom: 2px; }
        .item-name { font-size: 14px; font-weight: bold; line-height: 1.4; color: var(--t1-charcoal); }
        
        .price-input { background: #F5F5F5; border: 2px solid #E0E0E0; color: var(--t1-charcoal); padding: 8px 10px; border-radius: 10px; width: 85px; font-size: 13px; font-weight: bold; text-align: center; outline: none; }
        .price-input:focus { border-color: var(--t1-red); background: #FFF; }
        .qty-box { display: flex; align-items: center; background: #F5F5F5; border: 2px solid #E0E0E0; border-radius: 20px; padding: 2px; width: 90px; justify-content: space-between; }
        .qty-btn { background: #E0E0E0; color: var(--t1-charcoal); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 16px; font-weight: bold; cursor: pointer; }
        .qty-input { background: transparent; border: none; color: var(--t1-charcoal); width: 26px; text-align: center; font-size: 14px; font-weight: bold; outline: none; }
        
        .player-list { background: #F8F9FA; border-radius: 10px; border: 1px solid #E0E0E0; overflow: hidden; margin-top: 5px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #EBEBEB; }
        .player-row.active { background: #FFF0F2; }
        .player-name { font-size: 13px; font-weight: bold; color: #555; }
        
        #cartView { display: none; }
        .cart-header { font-size: 18px; font-weight: 900; margin: 20px 0 10px; padding-bottom: 10px; border-bottom: 2px solid #E0E0E0; display: flex; justify-content: space-between; align-items: center; }
        .cart-item { background: var(--card-bg); padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #E0E0E0; display: flex; justify-content: space-between; align-items: center; }
        .cart-item-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        .cart-item-meta { font-size: 11px; color: #888; }
        
        .btn-save-order { background: var(--t1-red); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(217, 56, 74, 0.3); }
        .btn-clear-all { background: #666; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 50px; width: 100%; opacity: 0.7; }
        
        .order-history-card { background: #FFF0F2; border: 2px solid #FFB3C1; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .order-title { font-weight: 900; color: var(--t1-red); margin-bottom: 10px; font-size: 14px; }
        .order-item-line { font-size: 12px; color: #555; margin-bottom: 4px; border-bottom: 1px dashed #FFD6DE; padding-bottom: 4px; }
        
        .footer-total { position: fixed; bottom: 65px; left: 0; right: 0; background: var(--card-bg); border-top: 3px solid var(--t1-red); padding: 10px 15px; text-align: center; z-index: 999; }
        .total-krw { font-size: 24px; font-weight: 900; color: var(--t1-red); }
        .converts { font-size: 12px; color: #888; margin-top: 4px; font-weight: bold; }
        .pc-hint { font-size: 11px; margin-top: 8px; color: #000; background: #FFD700; padding: 4px 12px; border-radius: 20px; display: inline-block; font-weight: bold; }
        
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #2D2D2D; display: flex; height: 65px; z-index: 1000; }
        .tab-btn { flex: 1; background: transparent; color: #888; border: none; font-size: 15px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: white; background: var(--t1-red); }
    </style>
</head>

    <p>①想就是買 ②不買會後悔</p>

    <button class="btn-save-order" onclick="saveOrder()" id="saveBtn" style="display:none;">📦 儲存為新訂單 (結算並清空)</button>
    
    <div class="cart-header" style="margin-top: 40px;">📜 已儲存分單紀錄</div>

    <button class="btn-clear-all" onclick="resetEverything()">⚠️ 清空所有數據 (重頭開始)</button>

    <div class="pc-hint" id="pcDisplay">還差 50,000 KRW 獲得小卡</div>

<div class="tab-bar">

    <button class="tab-btn" id="tabCart" onclick="switchTab('cart')">🧾 分單</button>

        { id: 53, name: "[T1 Everywhere] 2026 Plushie Pouch | 2026 毛絨小袋", players: true, cat: "pre" },

        { id: 55, name: "Costume Mini Friends Plushie Keychain | 變裝迷你 毛絨鎖匙扣", players: true, cat: "pre" }, 
        { id: 56, name: "Costume Mini Friends Light Stick Cover | 變裝迷你 應援棒保護套", players: true, cat: "pre" },
        { id: 57, name: "Costume Mini Friends Acrylic Keychain | 變裝迷你 亞克力鎖匙扣", players: true, cat: "pre" }, 
        { id: 58, name: "Costume Mini Friends ID Photocard Holder | 變裝迷你 卡套/證件套", players: true, cat: "pre" },
        { id: 59, name: "Costume Mini Friends Acrylic Photocard Stand | 變裝迷你 亞克力小卡立牌", players: true, cat: "pre" }, 
        { id: 60, name: "Costume Mini Friends Artisan Keycap | 變裝迷你 手工鍵帽", players: true, cat: "pre" },
        { id: 61, name: "Costume Mini Friends Soft Pin Button | 變裝迷你 軟身襟章", players: true, cat: "pre" }, 
        { id: 62, name: "Costume Mini Friends Cereal Bowl | 變裝迷你 麥片碗", cat: "pre" },
        { id: 63, name: "[LoL] 2026 T1 Uniform Jersey | 2026 隊服 (短袖)", players: true, cat: "pre", price: 129000 }, 
        { id: 64, name: "2026 T1 Uniform Pants | 2026 隊服長褲", players: true, cat: "pre", price: 99000 },
        { id: 65, name: "Shopping bag (Large) | 購物袋 (大)", cat: "pre" }, 
        { id: 66, name: "Shopping bag (Small) | 購物袋 (小)", cat: "pre" }
    ];

    function saveToStorage() {
        const data = { prices, qtys, orders };
        localStorage.setItem('t1_cart_v13', JSON.stringify(data));
    }

    function loadFromStorage() {
        const saved = localStorage.getItem('t1_cart_v13');
        if (saved) {
            const d = JSON.parse(saved);
            prices = d.prices || {};
            qtys = d.qtys || {};
            orders = d.orders || [];
        } else {
            items.forEach(i => { if(i.price) prices[i.id] = i.price; });
        }
    }

    async function getRates() {
        try {
            const r = await fetch('https://open.er-api.com/v6/latest/KRW');
            const d = await r.json();
            rates = { JPY: d.rates.JPY, HKD: d.rates.HKD, TWD: d.rates.TWD };
            document.getElementById('rateBar').innerText = `1k KRW ≈ ${Math.round(rates.JPY*1000)} JPY | ${Math.round(rates.HKD*1000,1)} HKD | ${Math.round(rates.TWD*1000,1)} TWD`;
            calcTotal(); // 獲取匯率後重算一次
        } catch(e) {}
    }

    function initShop() {
        loadFromStorage();
        const app = document.getElementById('shopView');
        const sections = [ { key: 'hg', title: '🎪 HOMEGROUND EXCLUSIVE', class: 'cat-hg' }, { key: 'pre', title: '🛍️ PRE-PURCHASE EXCLUSIVE', class: 'cat-pre' }, { key: 'gen', title: '🛒 GENERAL MERCHANDISE', class: 'cat-general' } ];
        let html = "";
        sections.forEach(sec => {
            html += `<div class="category-section ${sec.class}"><div class="category-title">${sec.title}</div>`;
            items.filter(item => item.cat === sec.key).forEach(item => { html += createRow(item); });
            html += `</div>`;
        });
        app.innerHTML = html;
        calcTotal(); renderCart(); renderOrderHistory();
    }

    function createRow(item) {
        const currentP = prices[item.id] || "";
        let controlsHTML = '';
        if (!item.players) {
            const q = qtys[item.id] || 0;
            controlsHTML = `<div class="qty-box"><button class="qty-btn" onclick="updateQty('${item.id}', -1, ${item.id})">-</button><input type="number" class="qty-input" id="qty-${item.id}" value="${q}" readonly><button class="qty-btn" onclick="updateQty('${item.id}', 1, ${item.id})">+</button></div>`;
        }
        
        let rowClass = (item.players ? players.some(p => qtys[`${item.id}-${p}`] > 0) : qtys[item.id] > 0) ? "item-row active" : "item-row";

        let html = `<div class="${rowClass}" id="row-${item.id}">
                <div class="item-top"><div class="item-info"><div class="item-id">#${item.id.toString().padStart(2, '0')}</div><div class="item-name">${item.name}</div></div>
                <div style="display:flex; gap:8px;"><input type="number" class="price-input" id="price-${item.id}" value="${currentP}" placeholder="₩ 價格" oninput="updatePrice(${item.id}, this.value)">${controlsHTML}</div></div>`;

        if (item.players) {
            html += `<div class="player-list">`;
            players.forEach(p => {
                const key = `${item.id}-${p}`;
                const q = qtys[key] || 0;
                html += `<div class="player-row ${q>0?'active':''}" id="prow-${key}"><div class="player-name">${p}</div><div class="qty-box"><button class="qty-btn" onclick="updateQty('${key}', -1, ${item.id})">-</button><input type="number" class="qty-input" id="qty-${key}" value="${q}" readonly><button class="qty-btn" onclick="updateQty('${key}', 1, ${item.id})">+</button></div></div>`;
            });
            html += `</div>`;
        }
        return html + `</div>`;
    }

    function updatePrice(id, val) { prices[id] = parseInt(val) || 0; saveToStorage(); calcTotal(); renderCart(); }
    
    function updateQty(key, delta, parentId) {
        qtys[key] = Math.max(0, (qtys[key] || 0) + delta);
        document.getElementById(`qty-${key}`).value = qtys[key];
        
        const prow = document.getElementById(`prow-${key}`);
        if(prow) qtys[key] > 0 ? prow.classList.add('active') : prow.classList.remove('active');
        
        const item = items.find(i => i.id === parentId);
        let anyActive = item.players ? players.some(p => qtys[`${parentId}-${p}`] > 0) : qtys[parentId] > 0;
        document.getElementById(`row-${parentId}`).classList.toggle('active', anyActive);
        
        saveToStorage(); calcTotal(); renderCart();
    }

    function calcTotal() {
        let total = 0;
        items.forEach(item => {
            const p = prices[item.id] || 0;
            if (item.players) players.forEach(player => total += p * (qtys[`${item.id}-${player}`] || 0));
            else total += p * (qtys[item.id] || 0);
        });
        
        // 更新韓元顯示
        document.getElementById('totalDisplay').innerText = total.toLocaleString() + ' KRW';
        
        // 更新各國匯率顯示 (這行剛才漏了！)
        document.getElementById('convDisplay').innerText = `≈ ${Math.round(total*rates.JPY).toLocaleString()} JPY | ${Math.round(total*rates.HKD).toLocaleString()} HKD | ${Math.round(total*rates.TWD).toLocaleString()} TWD`;
        
        const count = Math.floor(total / 50000);
        const pcEl = document.getElementById('pcDisplay');
        pcEl.innerText = count > 0 ? `✨ 達成！可獲 ${count} 張小卡 (差 ${(50000 - total % 50000).toLocaleString()} 多一張)` : `還差 ${(50000 - total).toLocaleString()} KRW 獲得小卡`;
        return { total, count };
    }

    function switchTab(tab) {
        document.getElementById('shopView').style.display = tab === 'shop' ? 'block' : 'none';
        document.getElementById('cartView').style.display = tab === 'cart' ? 'block' : 'none';
        document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
        document.getElementById('tabCart').classList.toggle('active', tab === 'cart');
        if(tab === 'cart') { renderCart(); renderOrderHistory(); }
    }

    function renderCart() {
        const cartContent = document.getElementById('cartContent');
        let html = ""; let hasItems = false;
        items.forEach(item => {
            const p = prices[item.id] || 0;
            if (item.players) {
                players.forEach(player => {
                    const q = qtys[`${item.id}-${player}`];
                    if(q > 0) {
                        hasItems = true;
                        html += `<div class="cart-item"><div><div class="cart-item-name">${item.name} [${player}]</div><div class="cart-item-meta">₩${p.toLocaleString()} × ${q}</div></div><div style="font-weight:900; color:#D9384A;">${(p*q).toLocaleString()}</div></div>`;
                    }
                });
            } else if(qtys[item.id] > 0) {
                hasItems = true;
                html += `<div class="cart-item"><div><div class="cart-item-name">${item.name}</div><div class="cart-item-meta">₩${p.toLocaleString()} × ${qtys[item.id]}</div></div><div style="font-weight:900; color:#D9384A;">${(p*qtys[item.id]).toLocaleString()}</div></div>`;
            }
        });
        cartContent.innerHTML = hasItems ? html : `<div style="text-align:center; padding:30px; color:#888;">購物車空空如也 🐧<br><span style="font-size:12px;">多買多享受</span></div>`;
        document.getElementById('saveBtn').style.display = hasItems ? 'block' : 'none';
    }

    function saveOrder() {
        const { total, count } = calcTotal();
        let orderItems = [];
        items.forEach(item => {
            const p = prices[item.id] || 0;
            if (item.players) players.forEach(player => { if(qtys[`${item.id}-${player}`] > 0) orderItems.push(`${item.name} [${player}] (₩${p.toLocaleString()}) × ${qtys[`${item.id}-${player}`]}`); });
            else if(qtys[item.id] > 0) orderItems.push(`${item.name} (₩${p.toLocaleString()}) × ${qtys[item.id]}`);
        });
        orders.push({ id: Date.now(), total, count, items: orderItems });
        Object.keys(qtys).forEach(k => qtys[k] = 0);
        document.querySelectorAll('.qty-input').forEach(el => el.value = 0);
        document.querySelectorAll('.item-row, .player-row').forEach(el => el.classList.remove('active'));
        saveToStorage(); renderCart(); calcTotal(); renderOrderHistory();
        alert("✅ 訂單已儲存！");
    }

    function renderOrderHistory() {
        const div = document.getElementById('orderHistory');
        if(orders.length === 0) { div.innerHTML = `<div style="text-align:center; color:#888; font-size:12px; padding:20px;">暫無紀錄</div>`; return; }
        let html = "";
        orders.forEach((o, idx) => {
            html += `<div class="order-history-card"><div class="order-title" style="display:flex; justify-content:space-between;"><span>📦 訂單 ${idx+1} <br><small>共 ${o.total.toLocaleString()} KRW | ${o.count} 小卡</small></span><button onclick="deleteOrder(${o.id})" style="background:none; border:none; font-size:18px;">🗑️</button></div>`;
            o.items.forEach(line => html += `<div class="order-item-line">${line}</div>`);
            html += `</div>`;
        });
        div.innerHTML = html;
    }

    function deleteOrder(id) { orders = orders.filter(o => o.id !== id); saveToStorage(); renderOrderHistory(); }
    
    function resetEverything() { if(confirm("確定要清空所有已輸入的價格、數量和訂單紀錄嗎？")) { localStorage.removeItem('t1_cart_v13'); location.reload(); } }

    getRates(); initShop();
</script>
</body>
</html>
