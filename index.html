<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T1 HG Wishlist</title>
    <style>
        :root { 
            --t1-red: #D9384A; --t1-charcoal: #2D2D2D; --bg-color: #F8F9FA; --card-bg: #FFFFFF; 
            --cat-hg-bg: #FFF0F2; --cat-hg-border: #FFB3C1;
            --cat-pre-bg: #F0F7FF; --cat-pre-border: #A3CFFF;
            --cat-gen-bg: #F0F0F0; --cat-gen-border: #CCCCCC;
        }
        
        body { background: var(--bg-color); color: var(--t1-charcoal); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 15px; padding-bottom: 240px; }
        
        .header { text-align: center; padding: 20px 0; border-bottom: 4px solid var(--t1-red); position: sticky; top: 0; background: var(--bg-color); z-index: 1000; }
        .header h1 { margin:0; font-size: 22px; font-weight: 900; letter-spacing: 1px; color: var(--t1-charcoal); }
        .header p { margin: 5px 0 0 0; font-size: 12px; color: #888; font-weight: bold; }
        
        .currency-bar { background: var(--card-bg); padding: 12px; border-radius: 12px; font-size: 12px; margin: 15px 0; text-align: center; font-weight: bold; border: 2px solid #E0E0E0; color: #666; }
        
        /* Shop View Styles */
        .category-section { margin-top: 35px; border-radius: 16px; border: 3px solid; padding: 15px 10px; }
        .category-title { font-size: 14px; font-weight: 900; margin: -30px 0 15px 10px; display: inline-block; padding: 6px 16px; border-radius: 20px; }
        
        .cat-hg { border-color: var(--cat-hg-border); background: var(--cat-hg-bg); } .cat-hg .category-title { background: var(--t1-red); color: white; }
        .cat-pre { border-color: var(--cat-pre-border); background: var(--cat-pre-bg); } .cat-pre .category-title { background: #3b82f6; color: white; }
        .cat-general { border-color: var(--cat-gen-border); background: var(--cat-gen-bg); } .cat-general .category-title { background: #888; color: white; }
        
        .item-row { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 12px; display: flex; flex-direction: column; border: 2px solid transparent; opacity: 0.6; transform: scale(0.98); transition: all 0.2s ease; }
        .item-row.active { opacity: 1; transform: scale(1); border: 2px solid var(--t1-red); box-shadow: 0 4px 12px rgba(217, 56, 74, 0.15); }
        
        .item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .item-info { flex: 1; padding-right: 10px; }
        .item-id { font-size: 13px; font-weight: 900; margin-bottom: 4px; color: var(--t1-red); }
        .item-name { font-size: 14px; font-weight: bold; line-height: 1.4; color: var(--t1-charcoal); }
        
        .price-input { background: #F5F5F5; border: 2px solid #E0E0E0; color: var(--t1-charcoal); padding: 8px 10px; border-radius: 10px; width: 85px; font-size: 13px; font-weight: bold; text-align: center; outline: none; -moz-appearance: textfield; }
        .price-input::-webkit-outer-spin-button, .price-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .price-input:focus { border-color: var(--t1-red); background: #FFF; }
        .qty-box { display: flex; align-items: center; background: #F5F5F5; border: 2px solid #E0E0E0; border-radius: 20px; padding: 2px; width: 90px; justify-content: space-between; }
        .qty-btn { background: #E0E0E0; color: var(--t1-charcoal); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 16px; font-weight: bold; cursor: pointer; }
        .qty-btn:active { background: var(--t1-red); color: white; }
        .qty-input { background: transparent; border: none; color: var(--t1-charcoal); width: 26px; text-align: center; font-size: 14px; font-weight: bold; outline: none; padding: 0; }
        .qty-input::-webkit-outer-spin-button, .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .player-list { background: #F8F9FA; border-radius: 10px; border: 1px solid #E0E0E0; overflow: hidden; margin-top: 5px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-bottom: 1px solid #EBEBEB; }
        .player-row:last-child { border-bottom: none; }
        .player-row.active { background: #FFF0F2; }
        .player-name { font-size: 13px; font-weight: bold; color: #555; }
        .player-row.active .player-name { color: var(--t1-red); }

        /* Cart View Styles */
        #cartView { display: none; }
        .cart-header { font-size: 18px; font-weight: 900; margin: 20px 0 15px; padding-bottom: 10px; border-bottom: 2px solid #E0E0E0; }
        .cart-item { background: var(--card-bg); padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #E0E0E0; display: flex; justify-content: space-between; align-items: center; }
        .cart-item-name { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        .cart-item-meta { font-size: 12px; color: #888; }
        .cart-empty { text-align: center; padding: 40px 20px; color: #888; font-weight: bold; background: var(--card-bg); border-radius: 12px; border: 2px dashed #CCC; }
        
        .btn-save-order { background: var(--t1-red); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 10px rgba(217, 56, 74, 0.3); }
        .btn-save-order:active { transform: scale(0.98); }
        
        .order-history-card { background: #FFF0F2; border: 2px solid #FFB3C1; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .order-title { font-weight: 900; color: var(--t1-red); margin-bottom: 10px; font-size: 15px; display: flex; justify-content: space-between; align-items: flex-start; }
        .order-item-line { font-size: 13px; color: #555; margin-bottom: 4px; border-bottom: 1px dashed #FFD6DE; padding-bottom: 4px; }
        
        /* Total & Tab Footer */
        .footer-total { position: fixed; bottom: 65px; left: 0; right: 0; background: var(--card-bg); border-top: 3px solid var(--t1-red); padding: 10px 15px; text-align: center; z-index: 999; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
        .total-krw { font-size: 24px; font-weight: 900; color: var(--t1-red); margin-bottom: 2px;}
        .converts { font-size: 13px; color: #888; font-weight: bold; margin-bottom: 6px; }
        .pc-hint { font-size: 11px; color: #000; background: #FFD700; padding: 4px 12px; border-radius: 20px; display: inline-block; font-weight: bold; }
        
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #2D2D2D; display: flex; height: 65px; z-index: 1000; }
        .tab-btn { flex: 1; background: transparent; color: #888; border: none; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { color: white; background: var(--t1-red); }
    </style>
</head>

        { id: 66, name: "Shopping bag_small | 購物袋 (小)", cat: "pre" }
    ];

    async function getRates() {
        try {
            const r = await fetch('https://open.er-api.com/v6/latest/KRW');
            const d = await r.json();
            rates = { JPY: d.rates.JPY, HKD: d.rates.HKD, TWD: d.rates.TWD };
            document.getElementById('rateBar').innerText = `1k KRW ≈ ${Math.round(rates.JPY*1000)} JPY | ${Math.round(rates.HKD*1000,1)} HKD | ${Math.round(rates.TWD*1000,1)} TWD`;
        } catch(e) {}
        calcTotal();
    }

    function initShop() {
        const app = document.getElementById('shopView');
        const sections = [ { key: 'hg', title: '🎪 HOMEGROUND EXCLUSIVE', class: 'cat-hg' }, { key: 'pre', title: '🛍️ PRE-PURCHASE EXCLUSIVE', class: 'cat-pre' }, { key: 'gen', title: '🛒 GENERAL MERCHANDISE', class: 'cat-general' } ];
        let html = "";
        sections.forEach(sec => {
            html += `<div class="category-section ${sec.class}"><div class="category-title">${sec.title}</div>`;
            items.filter(item => item.cat === sec.key).forEach(item => { html += createRow(item); });
            html += `</div>`;
        });
        app.innerHTML = html;
    }

    function createRow(item) {
        prices[item.id] = item.price || 0;
        const displayPrice = item.price ? item.price : ""; 

        let controlsHTML = '';
        if (!item.players) {
            qtys[item.id] = 0;
            controlsHTML = `<div class="qty-box"><button class="qty-btn" onclick="updateQty('${item.id}', -1, ${item.id})">-</button><input type="number" class="qty-input" id="qty-${item.id}" value="0" readonly><button class="qty-btn" onclick="updateQty('${item.id}', 1, ${item.id})">+</button></div>`;
        }
        
        let html = `<div class="item-row" id="row-${item.id}">
                <div class="item-top"><div class="item-info"><div class="item-id">#${item.id.toString().padStart(2, '0')}</div><div class="item-name">${item.name}</div></div>
                <div style="display:flex; gap:10px;"><input type="number" class="price-input" value="${displayPrice}" placeholder="₩ 價格" oninput="updatePrice(${item.id}, this.value)">${controlsHTML}</div></div>`;

        if (item.players) {
            html += `<div class="player-list">`;
            players.forEach(p => {
                const key = `${item.id}-${p}`; qtys[key] = 0;
                html += `<div class="player-row" id="prow-${key}"><div class="player-name">${p}</div><div class="qty-box"><button class="qty-btn" onclick="updateQty('${key}', -1, ${item.id})">-</button><input type="number" class="qty-input" id="qty-${key}" value="0" readonly><button class="qty-btn" onclick="updateQty('${key}', 1, ${item.id})">+</button></div></div>`;
            });
            html += `</div>`;
        }
        return html + `</div>`;
    }

    function updatePrice(id, val) { prices[id] = parseInt(val) || 0; calcTotal(); renderCart(); }
    
    function updateQty(key, delta, parentId) {
        let newQty = Math.max(0, qtys[key] + delta);
        qtys[key] = newQty;
        document.getElementById(`qty-${key}`).value = newQty;
        
        const prow = document.getElementById(`prow-${key}`);
        if(prow) { newQty > 0 ? prow.classList.add('active') : prow.classList.remove('active'); }
        
        const item = items.find(i => i.id === parentId);
        let anyActive = item.players ? players.some(p => qtys[`${parentId}-${p}`] > 0) : qtys[parentId] > 0;
        const row = document.getElementById(`row-${parentId}`);
        anyActive ? row.classList.add('active') : row.classList.remove('active');
        
        calcTotal(); renderCart();
    }

    function calcTotal() {
        let total = 0;
        items.forEach(item => {
            const p = prices[item.id] || 0;
            if (item.players) { players.forEach(player => { total += p * qtys[`${item.id}-${player}`]; }); } 
            else { total += p * qtys[item.id]; }
        });
        
        document.getElementById('totalDisplay').innerText = total.toLocaleString() + ' KRW';
        document.getElementById('convDisplay').innerText = `≈ ${Math.round(total*rates.JPY).toLocaleString()} JPY | ${Math.round(total*rates.HKD).toLocaleString()} HKD | ${Math.round(total*rates.TWD).toLocaleString()} TWD`;
        
        const count = Math.floor(total / 50000);
        const next = 50000 - (total % 50000);
        const pcEl = document.getElementById('pcDisplay');
        if(count > 0) { pcEl.innerText = `✨ 達成！可獲 ${count} 張小卡 (差 ${next.toLocaleString()} 多一張)`; pcEl.style.backgroundColor = '#FFD700'; pcEl.style.color = '#000'; } 
        else { pcEl.innerText = `還差 ${next.toLocaleString()} KRW 獲得小卡`; pcEl.style.backgroundColor = '#E0E0E0'; pcEl.style.color = '#666'; }
        return { total, count };
    }

    function switchTab(tab) {
        document.getElementById('shopView').style.display = tab === 'shop' ? 'block' : 'none';
        document.getElementById('cartView').style.display = tab === 'cart' ? 'block' : 'none';
        document.getElementById('tabShop').classList.toggle('active', tab === 'shop');
        document.getElementById('tabCart').classList.toggle('active', tab === 'cart');
        if(tab === 'cart') renderCart();
    }

    function renderCart() {
        const cartContent = document.getElementById('cartContent');
        let html = ""; let hasItems = false;
        
        items.forEach(item => {
            const p = prices[item.id] || 0;
            if (item.players) {
                players.forEach(player => {
                    const q = qtys[`${item.id}-${player}`];
                    if(q > 0) {
                        hasItems = true;
                        html += `<div class="cart-item"><div><div class="cart-item-name">#${item.id.toString().padStart(2,'0')} ${item.name} [${player}]</div><div class="cart-item-meta">${p.toLocaleString()} KRW × ${q}</div></div><div style="font-weight:900; color:#D9384A;">${(p*q).toLocaleString()} KRW</div></div>`;
                    }
                });
            } else {
                const q = qtys[item.id];
                if(q > 0) {
                    hasItems = true;
                    html += `<div class="cart-item"><div><div class="cart-item-name">#${item.id.toString().padStart(2,'0')} ${item.name}</div><div class="cart-item-meta">${p.toLocaleString()} KRW × ${q}</div></div><div style="font-weight:900; color:#D9384A;">${(p*q).toLocaleString()} KRW</div></div>`;
                }
            }
        });
        
        cartContent.innerHTML = hasItems ? html : `<div class="cart-empty">尚未加入任何周邊商品 🐧</div>`;
        document.getElementById('saveBtn').style.display = hasItems ? 'block' : 'none';
    }

    function saveOrder() {
        const { total, count } = calcTotal();
        let orderItems = [];
        items.forEach(item => {
            const p = prices[item.id] || 0;
            if (item.players) {
                players.forEach(player => {
                    const q = qtys[`${item.id}-${player}`];
                    if(q > 0) orderItems.push(`#${item.id.toString().padStart(2,'0')} ${item.name} [${player}] (₩${p.toLocaleString()}) × ${q}`);
                });
            } else {
                if(qtys[item.id] > 0) orderItems.push(`#${item.id.toString().padStart(2,'0')} ${item.name} (₩${p.toLocaleString()}) × ${qtys[item.id]}`);
            }
        });
        
        orders.push({ id: Date.now(), total, count, items: orderItems });
        
        for(let key in qtys) qtys[key] = 0;
        document.querySelectorAll('.qty-input').forEach(el => el.value = 0);
        document.querySelectorAll('.item-row, .player-row').forEach(el => el.classList.remove('active'));
        
        renderCart(); calcTotal(); renderOrderHistory();
        alert(`✅ 成功儲存訂單！購物車已清空。`);
    }

    function renderOrderHistory() {
        const historyDiv = document.getElementById('orderHistory');
        if(orders.length === 0) {
            historyDiv.innerHTML = `<div style="text-align:center; color:#888; font-size:12px; margin-top:20px;">暫無已儲存的訂單</div>`;
            return;
        }
        
        let html = "";
        orders.forEach((o, index) => {
            html += `<div class="order-history-card">
                        <div class="order-title">
                            <span>📦 訂單 ${index + 1} <br><span style="font-size:12px; color:#D9384A;">共 ${o.total.toLocaleString()} KRW | 獲得 ${o.count} 張小卡</span></span>
                            <button onclick="deleteOrder(${o.id})" style="background:transparent; border:none; font-size:18px; cursor:pointer; padding:0;">🗑️</button>
                        </div>`;
            o.items.forEach(line => { html += `<div class="order-item-line">${line}</div>`; });
            html += `</div>`;
        });
        historyDiv.innerHTML = html;
    }

    function deleteOrder(id) {
        const index = orders.findIndex(o => o.id === id);
        if (index > -1) {
            orders.splice(index, 1);
            renderOrderHistory();
        }
    }

    getRates(); initShop();
</script>
</body>
</html>
